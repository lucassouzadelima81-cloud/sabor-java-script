<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>indrodução javascript</h1>
     <!--
    pedirpara o usuario digitar o nome e idade e apresentar na tela"seu nome é ...e sua idade é ...-->

    <script>
         let primeiroNumero = Number(prompt("primeiroNumero"))
        let segundoNumero = Number(prompt("segundoNumero"))
        let soma = primeiroNumero - segundoNumero

        alert (primeiroNumero + "-" + segundoNumero + "=" + soma)
    </script>
    
</body>
</html>
