<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

</head>

<body>
    <h1>indrodução javascript</h1>
    <!--
    pedirpara o usuario digitar o nome e idade e apresentar na tela"seu nome é ...e sua idade é ...-->

    <script>
        let primeiroNumero = Number(prompt("digite o primeiro numero:"))
        let segundoNumero = Number(prompt("digite o segundo numero:"))
        let soma = primeiroNumero + segundoNumero

        alert(typeof primeiroNumero)

        alert(primeiroNumero + "+" + segundoNumero + "=" + soma)
    </script>

</body>
